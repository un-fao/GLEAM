name: Feature Enhancement Request
description: I want to improve an existing feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For changes to **existing** behaviour, clearly describe what exists today and how it should change.

  - type: textarea
    id: scope
    attributes:
      label: What needs improvement?
      description: What part of the package is affected? (e.g. `run_gleam()`, a `run_*_module`, documentation section)
    validations:
      required: true

  - type: textarea
    id: current_vs_desired
    attributes:
      label: What is the current behaviour, and what should it be instead?
      description: Describe how it works today and how you want it to change
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why is this improvement needed?
      description: Motivation (e.g. correctness, clarity, performance, usability)
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example (optional)
      description: Before/after R snippet or concrete scenario
      render: r

  - type: textarea
    id: use_cases
    attributes:
      label: Real-world use cases (optional)
      description: Where would this improvement be useful in practice?